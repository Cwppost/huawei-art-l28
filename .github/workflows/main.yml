package com.example.codelauncherphone;

import android.os.Bundle;
import android.view.View;
import android.widget.AdapterView;
import android.widget.ArrayAdapter;
import android.widget.EditText;
import android.widget.GridView;
import android.widget.Toast;
import androidx.appcompat.app.AlertDialog;
import androidx.appcompat.app.AppCompatActivity;
import java.util.ArrayList;

public class MainActivity extends AppCompatActivity {

    private GridView tagGridView;
    private ArrayList<String> tagList;
    private ArrayAdapter<String> tagAdapter;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        try {
            setContentView(R.layout.activity_main);

            tagGridView = findViewById(R.id.tagGridView);

            tagList = new ArrayList<>();
            tagList.add("功能A");
            tagList.add("功能B");
            tagList.add("功能C");
            tagList.add("功能D");
            tagList.add("功能E");
            tagList.add("功能F");

            tagAdapter = new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, tagList);
            tagGridView.setAdapter(tagAdapter);

            tagGridView.setOnItemClickListener((parent, view, position, id) ->
                    safeExecute(() -> showRenameTagDialog(position))
            );

            tagGridView.setOnItemLongClickListener((parent, view, position, id) -> {
                safeExecute(() -> {
                    if (isPositionValid(position)) {
                        tagList.remove(position);
                        notifyAdapterSafe();
                        Toast.makeText(MainActivity.this, "标签已删除", Toast.LENGTH_SHORT).show();
                    }
                });
                return true;
            });

        } catch (Exception e) {
            Toast.makeText(this, "页面加载失败", Toast.LENGTH_SHORT).show();
        }
    }

    /* ================= 安全工具方法 ================= */

    private boolean isPositionValid(int position) {
        return position >= 0 && position < tagList.size();
    }

    private void safeExecute(SafeRunnable runnable) {
        try {
            runnable.run();
        } catch (Exception e) {
            Toast.makeText(this, "操作异常，请重试", Toast.LENGTH_SHORT).show();
        }
    }

    private void notifyAdapterSafe() {
        try {
            if (tagAdapter != null) {
                tagAdapter.notifyDataSetChanged();
            }
        } catch (Exception ignored) {
        }
    }

    /* ================= 核心功能 ================= */

    private void showRenameTagDialog(final int position) {
        if (!isPositionValid(position)) return;

        try {
            final EditText input = new EditText(this);
            input.setHint("输入新标签名");
            input.setText(tagList.get(position));

            new AlertDialog.Builder(this)
                    .setTitle("修改标签名称")
                    .setView(input)
                    .setPositiveButton("确定", (dialog, which) -> {
                        try {
                            String newName = input.getText().toString().trim();
                            if (newName.isEmpty()) {
                                Toast.makeText(MainActivity.this, "名称不能为空", Toast.LENGTH_SHORT).show();
                                return;
                            }
                            if (isPositionValid(position)) {
                                tagList.set(position, newName);
                                notifyAdapterSafe();
                            }
                        } catch (Exception e) {
                            Toast.makeText(MainActivity.this, "修改失败", Toast.LENGTH_SHORT).show();
                        }
                    })
                    .setNegativeButton("取消", null)
                    .show();

        } catch (Exception e) {
            Toast.makeText(this, "对话框打开失败", Toast.LENGTH_SHORT).show();
        }
    }

    /* ================= 函数式接口 ================= */
    interface SafeRunnable {
        void run() throws Exception;
